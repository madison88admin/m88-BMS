[build]
  publish = "frontend/dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Configure secrets scanning
[secrets-scanning]
  enabled = true
  # Ignore these keys (public keys or example values)
  ignore_keys = [
    "SUPABASE_URL",
    "SUPABASE_ANON_KEY"
  ]
