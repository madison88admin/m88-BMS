[build]
  publish = "frontend/dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# SPA fallback (API proxy is in frontend/public/_redirects)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Configure secrets scanning
[secrets-scanning]
  enabled = true
  # Ignore these keys (public keys or example values)
  ignore_keys = [
    "SUPABASE_URL",
    "SUPABASE_ANON_KEY"
  ]
