[build]
  publish = "frontend/dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Redirects are in frontend/public/_redirects (copied to dist/ during build)

# Configure secrets scanning
[secrets-scanning]
  enabled = true
  # Ignore these keys (public keys or example values)
  ignore_keys = [
    "SUPABASE_URL",
    "SUPABASE_ANON_KEY"
  ]
