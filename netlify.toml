[build]
  publish = "frontend/dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# API proxy: route all /api/* to VPS backend directly
[[redirects]]
  from = "/api/*"
  to = "http://5.223.78.194/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Configure secrets scanning
[secrets-scanning]
  enabled = true
  # Ignore these keys (public keys or example values)
  ignore_keys = [
    "SUPABASE_URL",
    "SUPABASE_ANON_KEY"
  ]
