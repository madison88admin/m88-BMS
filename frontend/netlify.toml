[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# Production API routing — choose ONE:
#
# Option A (Render backend — current production default):
# Frontend makes direct API calls to Render backend
# No redirect needed

# Option B (Netlify Functions — sequential approval parity):
# Remove Option A and use the redirects in the repo root netlify.toml instead.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
